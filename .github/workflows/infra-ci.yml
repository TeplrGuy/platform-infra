name: infra-ci

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: infra-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-bicep:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Azure CLI
        uses: azure/cli@v2
        with:
          inlineScript: |
            az bicep install
            az bicep version
            az bicep build --file infra/main.bicep
